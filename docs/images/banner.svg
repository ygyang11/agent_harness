<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f0e8"/>
      <stop offset="100%" style="stop-color:#ebe3d5"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#cc785c"/>
      <stop offset="100%" style="stop-color:#d4956b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="300" fill="url(#bg)" rx="0"/>
  <!-- Decorative nodes and connections -->
  <!-- Left cluster -->
  <circle cx="180" cy="110" r="6" fill="#cc785c" opacity="0.5"/>
  <circle cx="220" cy="85" r="5" fill="#d4956b" opacity="0.4"/>
  <circle cx="160" cy="145" r="4" fill="#b8886e" opacity="0.35"/>
  <line x1="180" y1="110" x2="220" y2="85" stroke="#cc785c" stroke-width="1" opacity="0.25"/>
  <line x1="180" y1="110" x2="160" y2="145" stroke="#d4956b" stroke-width="1" opacity="0.25"/>
  <line x1="220" y1="85" x2="160" y2="145" stroke="#b8886e" stroke-width="1" opacity="0.15"/>
  <!-- Right cluster -->
  <circle cx="1020" cy="120" r="6" fill="#cc785c" opacity="0.5"/>
  <circle cx="1060" cy="95" r="5" fill="#d4956b" opacity="0.4"/>
  <circle cx="1040" cy="160" r="4" fill="#b8886e" opacity="0.35"/>
  <circle cx="1000" cy="155" r="3.5" fill="#cc785c" opacity="0.3"/>
  <line x1="1020" y1="120" x2="1060" y2="95" stroke="#cc785c" stroke-width="1" opacity="0.25"/>
  <line x1="1020" y1="120" x2="1040" y2="160" stroke="#d4956b" stroke-width="1" opacity="0.25"/>
  <line x1="1060" y1="95" x2="1040" y2="160" stroke="#b8886e" stroke-width="1" opacity="0.15"/>
  <line x1="1000" y1="155" x2="1020" y2="120" stroke="#cc785c" stroke-width="1" opacity="0.15"/>
  <line x1="1000" y1="155" x2="1040" y2="160" stroke="#d4956b" stroke-width="1" opacity="0.15"/>
  <!-- Subtle bottom dots -->
  <circle cx="300" cy="230" r="2.5" fill="#cc785c" opacity="0.15"/>
  <circle cx="900" cy="220" r="2" fill="#d4956b" opacity="0.12"/>
  <circle cx="400" cy="245" r="1.5" fill="#b8886e" opacity="0.1"/>
  <circle cx="800" cy="240" r="2" fill="#cc785c" opacity="0.1"/>
  <!-- Title -->
  <text x="600" y="138" text-anchor="middle" font-family="'SF Pro Display', 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="#2d1f14" letter-spacing="-1">Agent Harness</text>
  <!-- Accent line -->
  <rect x="480" y="158" width="240" height="2.5" rx="1.25" fill="url(#accent)"/>
  <!-- Subtitle -->
  <text x="600" y="195" text-anchor="middle" font-family="'SF Pro Text', 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="18" fill="#8b7355" letter-spacing="3" font-weight="400">BUILD  ·  EXTEND  ·  OWN</text>
</svg>
