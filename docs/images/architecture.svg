<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f0e8"/>
      <stop offset="100%" style="stop-color:#ebe3d5"/>
    </linearGradient>
    <style>
      .layer-bg { rx: 8; ry: 8; }
      .layer-title { font-family: 'SF Pro Display', 'Inter', 'Segoe UI', system-ui, sans-serif; font-size: 14px; font-weight: 600; }
      .layer-items { font-family: 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace; font-size: 12px; fill: #6b5b45; }
      .section-label { font-family: 'SF Pro Text', 'Inter', 'Segoe UI', system-ui, sans-serif; font-size: 11px; fill: #8b7355; font-weight: 500; }
    </style>
  </defs>
  <rect width="900" height="520" fill="url(#bgGrad)" rx="12"/>

  <!-- Layer 1: Orchestration -->
  <rect x="40" y="30" width="820" height="60" class="layer-bg" fill="#cc785c" opacity="0.12"/>
  <text x="60" y="55" class="layer-title" fill="#cc785c">Orchestration</text>
  <text x="60" y="75" class="layer-items">Pipeline  │  DAG  │  Router  │  Team</text>

  <!-- Layer 2: Agent -->
  <rect x="40" y="105" width="820" height="60" class="layer-bg" fill="#cc785c" opacity="0.09"/>
  <text x="60" y="130" class="layer-title" fill="#b8654a">Agent</text>
  <text x="60" y="150" class="layer-items">ReActAgent  │  PlanAndExecuteAgent  │  ConversationalAgent</text>

  <!-- Layer 3: Four columns -->
  <!-- Tool -->
  <rect x="40" y="180" width="195" height="90" class="layer-bg" fill="#d4c4a8" opacity="0.35"/>
  <text x="55" y="203" class="section-label">TOOL</text>
  <text x="55" y="222" class="layer-items">@tool decorator</text>
  <text x="55" y="240" class="layer-items">ToolExecutor</text>
  <text x="55" y="258" class="layer-items">Built-in Tools</text>

  <!-- Memory -->
  <rect x="248" y="180" width="195" height="90" class="layer-bg" fill="#d4c4a8" opacity="0.35"/>
  <text x="263" y="203" class="section-label">MEMORY</text>
  <text x="263" y="222" class="layer-items">ShortTermMemory</text>
  <text x="263" y="240" class="layer-items">WorkingMemory</text>
  <text x="263" y="258" class="layer-items">LongTermMemory</text>

  <!-- Prompt -->
  <rect x="456" y="180" width="195" height="90" class="layer-bg" fill="#d4c4a8" opacity="0.35"/>
  <text x="471" y="203" class="section-label">PROMPT</text>
  <text x="471" y="222" class="layer-items">PromptTemplate</text>
  <text x="471" y="240" class="layer-items">PromptBuilder</text>
  <text x="471" y="258" class="layer-items">PromptLibrary</text>

  <!-- Context -->
  <rect x="664" y="180" width="196" height="90" class="layer-bg" fill="#d4c4a8" opacity="0.35"/>
  <text x="679" y="203" class="section-label">CONTEXT</text>
  <text x="679" y="222" class="layer-items">AgentContext</text>
  <text x="679" y="240" class="layer-items">StateManager</text>
  <text x="679" y="258" class="layer-items">ContextVariables</text>

  <!-- Layer 4: LLM Provider -->
  <rect x="40" y="290" width="820" height="60" class="layer-bg" fill="#cc785c" opacity="0.08"/>
  <text x="60" y="315" class="layer-title" fill="#a0634a">LLM Provider</text>
  <text x="60" y="335" class="layer-items">OpenAI  │  Anthropic  │  support Retry, Fallback</text>

  <!-- Layer 5: Core -->
  <rect x="40" y="365" width="820" height="55" class="layer-bg" fill="#d4c4a8" opacity="0.25"/>
  <text x="60" y="388" class="layer-title" fill="#996633">Core</text>
  <text x="60" y="406" class="layer-items">Config  │  Message  │  Event  │  Errors  │  Registry</text>

  <!-- Layer 6: Tracing / Utils -->
  <rect x="40" y="435" width="820" height="55" class="layer-bg" fill="#d4c4a8" opacity="0.2"/>
  <text x="60" y="458" class="layer-title" fill="#8b6b4a">Tracing / Utils</text>
  <text x="60" y="476" class="layer-items">TracingHooks  │  ConsoleExporter  │  JsonFileExporter</text>
</svg>
