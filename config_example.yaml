# ============================================================
# # Agent-Harness — Example Configuration File
# ============================================================
# Copy this file to `config.yaml` and fill in your values.
# ============================================================

# --- LLM Provider ---
llm:
  provider: "openai"            # "openai" | "anthropic"
  model: "gpt-x"                # Model identifier (e.g. gpt-5.4, claude-4.6-opus)
  temperature:                  # Sampling temperature (0.0 – 2.0)
  max_tokens:                   # Maximum output tokens
  api_key: ""                   # API key (overrides env var)
  base_url: ""                  # Custom API endpoint
                                # Examples:
                                #   OpenAI-compatible: "https://api.openai.com/v1"
                                #   Azure OpenAI:     "https://<resource>.openai.azure.com/"
  timeout: 180.0                # Request timeout in seconds
  max_retries: 5                # Max retry attempts for rate-limit errors
  retry_delay: 1.0              # Initial retry delay in seconds (exponential backoff)
  reasoning_effort: ""          # "low" | "medium" | "high" | "xhigh/max.."  (leave empty to use model default)

# --- Tool Execution ---
tool:
  max_concurrency: 5            # Max parallel tool executions
  default_timeout: 180.0        # Per-tool timeout in seconds
  sandbox_enabled: false        # Enable sandboxed execution (experimental)

# --- Memory ---
memory:
  short_term_max_messages: 50   # Max messages in short-term buffer
  short_term_max_tokens: 100000 # Token budget for short-term memory
  short_term_strategy: "sliding_window"  # "sliding_window" | "token_limit"
  forget_threshold: 0.3         # Weighted score below which memories are forgotten

# --- Search ---
search:
  provider: "tavily"            # "tavily" | "serpapi"
  tavily_api_key: ""            # Tavily API key
  serpapi_api_key: ""           # SerpAPI key

# --- PDF Parsing ---
pdf:
  provider: "mineru"            # "mineru" | "paddleocr"
  mineru_api_key: ""            # MinerU API key
  paddleocr_api_key: ""         # PaddleOCR API key

# --- Academic Paper Search ---
paper:
  semantic_scholar_api_key: "" # Semantic Scholar API key (optional, for higher rate limits)
                               # Without key: shared pool; With key: 1 req/s baseline
                               # Request at: https://www.semanticscholar.org/product/api#api-key

# --- Tracing & Observability ---
tracing:
  enabled: true                 # Enable tracing
  exporter: "console"           # "console" | "json_file"
  export_path: "./traces"       # Directory for trace exports

# --- General ---
verbose: false                  # Enable verbose output
